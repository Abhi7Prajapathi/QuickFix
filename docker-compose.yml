version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=quickfix_db
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=super_secret_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - .:/app
      - /app/node_modules        # CRITICAL: Forces Docker to use internal node_modules
      - /app/backend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:


